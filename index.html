<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>You're Invited</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: 'Montserrat', sans-serif;
color:white;
overflow-x:hidden;
}

/* background layers */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
transition:opacity 1s ease;
z-index:-2;
}

#bg1{background-image:url("https://thumbs.dreamstime.com/b/close-up-water-drop-nice-green-bg-color-22006770.jpg");opacity:1;}
#bg2{background-image:url("https://w0.peakpx.com/wallpaper/267/818/HD-wallpaper-best-background-backgrounds-nice.jpg");opacity:0;}
#bg3{background-image:url("https://wallpapers.com/images/featured/nice-background-61m89tafknmauh0h.jpg");opacity:0;}

/* overlay */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.6));
z-index:-1;
}

/* sections */

.section{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

/* text styles */

h1{
font-family:'Playfair Display',serif;
font-size:60px;
letter-spacing:3px;
margin-bottom:20px;
animation:fadeUp 1.5s ease;
}

h2{
font-weight:300;
font-size:28px;
letter-spacing:2px;
animation:fadeUp 2s ease;
}

p{
margin-top:15px;
font-size:18px;
opacity:0.9;
}

/* button */

.btn{
display:inline-block;
margin-top:30px;
padding:12px 28px;
border:1px solid white;
border-radius:30px;
text-decoration:none;
color:white;
transition:all 0.3s;
}

.btn:hover{
background:white;
color:black;
}

/* scroll hint */

.scroll{
position:absolute;
bottom:30px;
font-size:14px;
opacity:0.8;
animation:bounce 2s infinite;
}

/* animations */

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(8px);}
}

/* mobile */

@media(max-width:768px){

h1{font-size:38px;}
h2{font-size:22px;}

}

</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>
<div id="bg3" class="bg"></div>

<div class="overlay"></div>

<!-- section 1 -->

<section class="section" data-bg="1">

<div>

<h1>You're Invited</h1>

<h2>To the grand Farwell party !!!</h2>

<div class="scroll">scroll ↓</div>

</div>

</section>

<!-- section 2 -->

<section class="section" data-bg="2">

<div>

<h1><b><i>Venue:</i></b> Sri Sarathi Institute</h1>

<p>Happening on</p>

<h2>24 . 03 . 2026</h2>

</div>

</section>

<!-- section 3 -->

<section class="section" data-bg="3">

<div>

<h1>Join Us</h1>

<p>An evening of music, laughter and celebration</p>

<a class="btn">Save the Date</a>

</div>

</section>

<script>

const sections = document.querySelectorAll(".section");

window.addEventListener("scroll",()=>{

let scroll = window.scrollY + window.innerHeight/2;

sections.forEach(sec=>{

let top = sec.offsetTop;
let height = sec.offsetHeight;
let bg = sec.dataset.bg;

if(scroll>=top && scroll<top+height){

document.querySelectorAll(".bg").forEach(b=>b.style.opacity=0);

document.getElementById("bg"+bg).style.opacity=1;

}

});

});

</script>

</body>
</html>

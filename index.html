<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farewell Invitation</title>
<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    }

    /* Floating background sparkles */
    .sparkle {
        position: absolute;
        width: 6px;
        height: 6px;
        background: white;
        border-radius: 50%;
        opacity: 0.7;
        animation: float 6s infinite ease-in-out;
    }

    @keyframes float {
        0% { transform: translateY(0px); opacity: 0.5; }
        50% { transform: translateY(-100px); opacity: 1; }
        100% { transform: translateY(0px); opacity: 0.5; }
    }

    /* Hanging flowers */
    .flower {
        position: absolute;
        top: -100px;
        font-size: 24px;
        animation: drop 3s ease forwards;
    }

    @keyframes drop {
        0% { transform: translateY(-200px); }
        100% { transform: translateY(200px); }
    }

    .string {
        position: absolute;
        width: 2px;
        height: 200px;
        background: #444;
        top: 0;
        display:none;
    }

    /* Center invitation card */
    .card {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        /*background: rgba(255, 255, 255, 0.9);*/
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 0 30px rgba(0,0,0,0.2);
        animation: pop 2s ease forwards 1s;
    }

    @keyframes pop {
        0% { transform: translate(-50%, -50%) scale(0); }
        100% { transform: translate(-50%, -50%) scale(1); }
    }

    h1 {
        color: #d6336c;
        margin-bottom: 10px;
    }

    h2 {
        color: #444;
    }

    p {
        color: #555;
        font-size: 18px;
    }

    .date {
        font-size: 22px;
        font-weight: bold;
        color: #c2185b;
        margin-top: 15px;
    }

    /* Glow effect */
    .card:hover {
        box-shadow: 0 0 50px #ff6f91;
        transition: 0.5s;
    }
*{
background-color: black;
}
</style>
</head>
<body>

<!-- Sparkles -->
<script>
for (let i = 0; i < 50; i++) {
    let s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random() * window.innerWidth + "px";
    s.style.top = Math.random() * window.innerHeight + "px";
    s.style.animationDuration = (Math.random() * 5 + 3) + "s";
    document.body.appendChild(s);
}
</script>

<!-- Hanging Flowers -->
<script>
for (let i = 0; i < 8; i++) {
    let string = document.createElement("div");
    string.className = "string";
    string.style.left = (i * 12 + 5) + "%";

    let flower = document.createElement("div");
    flower.className = "flower";
    flower.innerHTML = "<wa-icon name="balloon" family="duotone" variant="thin"></wa-icon>";
    flower.style.left = (i * 12 + 5) + "%";

    document.body.appendChild(string);
    document.body.appendChild(flower);
}
</script>

<!-- Center Invitation -->
<div class="card">
/*<img src="C:\Users\knamb\Downloads\canva-gold-line-art-modern-employee-farewell-party-invitation-MO3nxOONV9E.jpg">*/
</div>

</body>
</html>
